<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="800" fill="#f5f5f5"/>
  
  <!-- Header -->
  <rect width="1200" height="60" fill="#0891b2"/>
  <text x="30" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white">Oracle Cloud Cost Optimizer</text>
  <text x="1000" y="40" font-family="Arial, sans-serif" font-size="14" fill="white">OCI Cost Analysis</text>
  
  <!-- Cost Overview -->
  <rect x="20" y="80" width="1160" height="180" fill="#ffffff" stroke="#e0e0e0" rx="4"/>
  <text x="40" y="110" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0891b2">Cost Overview - December 2024</text>
  
  <!-- Cost Cards -->
  <rect x="40" y="130" width="250" height="110" fill="#ecfeff" stroke="#0891b2" rx="4"/>
  <text x="50" y="155" font-family="Arial, sans-serif" font-size="12" fill="#666">Total Monthly Cost</text>
  <text x="50" y="185" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#0891b2">$45,230</text>
  <text x="50" y="210" font-family="Arial, sans-serif" font-size="11" fill="#dc2626">↑ 12% from last month</text>
  <text x="50" y="225" font-family="Arial, sans-serif" font-size="11" fill="#666">Annual: $542,760</text>
  
  <rect x="310" y="130" width="250" height="110" fill="#f0fdf4" stroke="#16a34a" rx="4"/>
  <text x="320" y="155" font-family="Arial, sans-serif" font-size="12" fill="#666">Potential Savings</text>
  <text x="320" y="185" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#16a34a">$12,450</text>
  <text x="320" y="210" font-family="Arial, sans-serif" font-size="11" fill="#059669">27% reduction</text>
  <text x="320" y="225" font-family="Arial, sans-serif" font-size="11" fill="#666">Annual: $149,400</text>
  
  <rect x="580" y="130" width="250" height="110" fill="#fef3c7" stroke="#d97706" rx="4"/>
  <text x="590" y="155" font-family="Arial, sans-serif" font-size="12" fill="#666">Unused Resources</text>
  <text x="590" y="185" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#d97706">$8,200</text>
  <text x="590" y="210" font-family="Arial, sans-serif" font-size="11" fill="#dc2626">18% of total</text>
  <text x="590" y="225" font-family="Arial, sans-serif" font-size="11" fill="#666">Can be terminated</text>
  
  <rect x="850" y="130" width="250" height="110" fill="#fce7f3" stroke="#be185d" rx="4"/>
  <text x="860" y="155" font-family="Arial, sans-serif" font-size="12" fill="#666">Reserved Instances</text>
  <text x="860" y="185" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#be185d">$4,250</text>
  <text x="860" y="210" font-family="Arial, sans-serif" font-size="11" fill="#059669">Potential savings</text>
  <text x="860" y="225" font-family="Arial, sans-serif" font-size="11" fill="#666">Annual: $51,000</text>
  
  <!-- Cost by Service -->
  <rect x="20" y="280" width="560" height="300" fill="#ffffff" stroke="#e0e0e0" rx="4"/>
  <text x="40" y="310" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0891b2">Cost by Service</text>
  
  <!-- Service Breakdown -->
  <rect x="40" y="330" width="520" height="40" fill="#ecfeff" stroke="#0891b2" rx="4"/>
  <text x="60" y="350" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0891b2">Compute (VMs)</text>
  <text x="60" y="365" font-family="Arial, sans-serif" font-size="11" fill="#666">$18,500 (41%)</text>
  <rect x="400" y="340" width="140" height="20" fill="#0891b2" rx="2"/>
  
  <rect x="40" y="380" width="520" height="40" fill="#ecfeff" stroke="#0891b2" rx="4"/>
  <text x="60" y="400" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0891b2">Database (Autonomous)</text>
  <text x="60" y="415" font-family="Arial, sans-serif" font-size="11" fill="#666">$12,300 (27%)</text>
  <rect x="400" y="390" width="93" height="20" fill="#0891b2" rx="2"/>
  
  <rect x="40" y="430" width="520" height="40" fill="#ecfeff" stroke="#0891b2" rx="4"/>
  <text x="60" y="450" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0891b2">Storage (Object)</text>
  <text x="60" y="465" font-family="Arial, sans-serif" font-size="11" fill="#666">$8,200 (18%)</text>
  <rect x="400" y="440" width="62" height="20" fill="#0891b2" rx="2"/>
  
  <rect x="40" y="480" width="520" height="40" fill="#ecfeff" stroke="#0891b2" rx="4"/>
  <text x="60" y="500" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0891b2">Networking</text>
  <text x="60" y="515" font-family="Arial, sans-serif" font-size="11" fill="#666">$4,130 (9%)</text>
  <rect x="400" y="490" width="31" height="20" fill="#0891b2" rx="2"/>
  
  <rect x="40" y="530" width="520" height="40" fill="#ecfeff" stroke="#0891b2" rx="4"/>
  <text x="60" y="550" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0891b2">Other Services</text>
  <text x="60" y="565" font-family="Arial, sans-serif" font-size="11" fill="#666">$2,100 (5%)</text>
  <rect x="400" y="540" width="16" height="20" fill="#0891b2" rx="2"/>
  
  <!-- Optimization Recommendations -->
  <rect x="600" y="280" width="580" height="300" fill="#ffffff" stroke="#e0e0e0" rx="4"/>
  <text x="620" y="310" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0891b2">Optimization Recommendations</text>
  
  <!-- Recommendation 1 -->
  <rect x="620" y="330" width="540" height="70" fill="#f0fdf4" stroke="#16a34a" rx="4"/>
  <text x="640" y="355" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#16a34a">Terminate Unused Instances</text>
  <text x="640" y="375" font-family="Arial, sans-serif" font-size="12" fill="#666">5 VM.Standard2.4 instances idle for 30+ days</text>
  <text x="640" y="390" font-family="Arial, sans-serif" font-size="12" fill="#059669">💰 Potential Savings: $8,200/month ($98,400/year)</text>
  
  <!-- Recommendation 2 -->
  <rect x="620" y="410" width="540" height="70" fill="#f0fdf4" stroke="#16a34a" rx="4"/>
  <text x="640" y="435" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#16a34a">Purchase Reserved Instances</text>
  <text x="640" y="455" font-family="Arial, sans-serif" font-size="12" fill="#666">Convert 10 on-demand instances to 1-year reserved</text>
  <text x="640" y="470" font-family="Arial, sans-serif" font-size="12" fill="#059669">💰 Potential Savings: $4,250/month ($51,000/year)</text>
  
  <!-- Recommendation 3 -->
  <rect x="620" y="490" width="540" height="70" fill="#fef3c7" stroke="#d97706" rx="4"/>
  <text x="640" y="515" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#d97706">Right-Size Instances</text>
  <text x="640" y="535" font-family="Arial, sans-serif" font-size="12" fill="#666">3 VM.Standard2.8 instances using &lt;40% CPU</text>
  <text x="640" y="550" font-family="Arial, sans-serif" font-size="12" fill="#d97706">💰 Potential Savings: $1,200/month ($14,400/year)</text>
  
  <!-- Multi-Cloud Comparison -->
  <rect x="20" y="600" width="1160" height="170" fill="#ffffff" stroke="#e0e0e0" rx="4"/>
  <text x="40" y="630" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0891b2">Multi-Cloud Cost Comparison</text>
  
  <!-- Comparison Table -->
  <rect x="40" y="650" width="1120" height="30" fill="#f3f4f6"/>
  <text x="60" y="670" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#374151">Cloud Provider</text>
  <text x="300" y="670" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#374151">Monthly Cost</text>
  <text x="500" y="670" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#374151">Annual Cost</text>
  <text x="700" y="670" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#374151">Savings vs OCI</text>
  <text x="900" y="670" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#374151">Migration Effort</text>
  
  <line x1="40" y1="680" x2="1160" y2="680" stroke="#e5e7eb"/>
  <text x="60" y="700" font-family="Arial, sans-serif" font-size="12" fill="#111">Oracle Cloud (OCI)</text>
  <text x="300" y="700" font-family="Arial, sans-serif" font-size="12" fill="#111" font-weight="bold">$45,230</text>
  <text x="500" y="700" font-family="Arial, sans-serif" font-size="12" fill="#111">$542,760</text>
  <text x="700" y="700" font-family="Arial, sans-serif" font-size="12" fill="#666">-</text>
  <text x="900" y="700" font-family="Arial, sans-serif" font-size="12" fill="#666">-</text>
  
  <line x1="40" y1="710" x2="1160" y2="710" stroke="#e5e7eb"/>
  <text x="60" y="730" font-family="Arial, sans-serif" font-size="12" fill="#111">AWS</text>
  <text x="300" y="730" font-family="Arial, sans-serif" font-size="12" fill="#059669" font-weight="bold">$38,450</text>
  <text x="500" y="730" font-family="Arial, sans-serif" font-size="12" fill="#059669">$461,400</text>
  <text x="700" y="730" font-family="Arial, sans-serif" font-size="12" fill="#059669">$81,360 (15%)</text>
  <text x="900" y="730" font-family="Arial, sans-serif" font-size="12" fill="#666">Medium</text>
  
  <line x1="40" y1="740" x2="1160" y2="740" stroke="#e5e7eb"/>
  <text x="60" y="760" font-family="Arial, sans-serif" font-size="12" fill="#111">Azure</text>
  <text x="300" y="760" font-family="Arial, sans-serif" font-size="12" fill="#059669" font-weight="bold">$39,200</text>
  <text x="500" y="760" font-family="Arial, sans-serif" font-size="12" fill="#059669">$470,400</text>
  <text x="700" y="760" font-family="Arial, sans-serif" font-size="12" fill="#059669">$72,360 (13%)</text>
  <text x="900" y="760" font-family="Arial, sans-serif" font-size="12" fill="#666">Medium</text>
</svg>

